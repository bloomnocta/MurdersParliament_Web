<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Murder's Parliament</title>
    <link rel="stylesheet" href="css/formulario.css" />
</head>
<body>
</body>
<body>
    <section class="form-wrapper">
        <div class="card-form">
            <div class="form-header">
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                </ul>
                <h2>Contacta con nosotros</h2>
                <p>Quieres la beta del juego? Escribenos</p>
            </div>
            <form>
                <div class="rel-input-group">
                    <label for="name">Nombre Completo:</label>
                    <input type="text" id="name" name="name" required maxlength="50">
                </div>
                <div class="rel-input-group">
                    <label for="email">Tu email de contacto</label>
                    <input type="email" name="email" id="email" required>
                </div>
                <div>
                    <legend>¿Tienes cuenta con nosotros?</legend>
                    <label for="acount">Si</label>
                    <input type="radio" name="acount" id="acc_yes">
                    <label for="acount">No</label>
                    <input type="radio" name="acount" id="acc_no">
                </div>
                <div>
                    <legend>¿Que quieres recibir?</legend>
                    <label for="">Quiero la BETA</label>  
                    <input type="checkbox" name="beta" id="beta">
                    <label for="ost">Quiero la OST</label>
                    <input type="checkbox" name="ost" id="ost">
                </div>
                <div class="rel-input-group">
                    <label for="message">Dejanos un mensaje</label>
                    <textarea name="msg" id="msg">Tu mensaje para nosotros</textarea>
                <div>
                </div>
                    <input type="submit" value="Enviar">
                </div>
            </form>
        </div>
    </section>
</body>
</html>
